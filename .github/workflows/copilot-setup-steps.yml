name: Copilot Setup Steps

on: workflow_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify build
        run: npm run build

      # Pre-install Python load-testing tools so the Copilot coding agent
      # does not need outbound access to PyPI (pypi.org / files.pythonhosted.org)
      # at task time. Setup steps run BEFORE the agent firewall is enforced.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Pre-install load test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install locust
